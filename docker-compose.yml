services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - EDISCOVERY_LLM_URL=http://ollama:11434/v1

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GPU-accelerated Ollama (NVIDIA only).
  # Usage: docker compose --profile gpu up -d
  ollama-gpu:
    image: ollama/ollama:latest
    profiles: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
