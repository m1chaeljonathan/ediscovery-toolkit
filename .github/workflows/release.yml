name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: eDiscovery-Toolkit-macOS
          - os: windows-latest
            artifact: eDiscovery-Toolkit-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller ediscovery-toolkit.spec --noconfirm

      # macOS: create .dmg from .app bundle
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "eDiscovery Toolkit" \
            -srcfolder "dist/eDiscovery Toolkit.app" \
            -ov -format UDZO \
            "dist/eDiscovery-Toolkit-macOS.dmg"

      # Windows: zip the output directory
      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/eDiscovery Toolkit/*" `
            -DestinationPath "dist/eDiscovery-Toolkit-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
